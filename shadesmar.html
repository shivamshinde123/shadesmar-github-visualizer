<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadesmar — GitHub Visualizer</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ========== RESET & BASE ========== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #050508;
      color: #c0c8d8;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }
    canvas { display: block; }

    /* ========== INPUT SCREEN ========== */
    #input-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 50% 80%, #0a0c14 0%, #030305 70%);
      z-index: 200;
      transition: opacity 0.6s ease;
    }
    #input-screen.hidden { opacity: 0; pointer-events: none; }
    #input-screen h1 {
      font-size: 2.4rem; font-weight: 300;
      color: #8aa8cc;
      letter-spacing: 0.15em;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
    }
    #input-screen .subtitle {
      font-size: 0.85rem; font-weight: 300;
      color: #4a5568;
      margin-bottom: 2.5rem;
      letter-spacing: 0.1em;
    }
    #input-form {
      display: flex; flex-direction: column;
      gap: 1rem; width: 320px;
    }
    #input-form input {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(120,150,200,0.15);
      border-radius: 6px;
      padding: 12px 16px;
      color: #c0c8d8;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.3s;
    }
    #input-form input:focus {
      border-color: rgba(120,160,220,0.4);
    }
    #input-form input::placeholder { color: #3a4258; }
    #input-form button {
      background: rgba(100,140,200,0.12);
      border: 1px solid rgba(100,140,200,0.25);
      border-radius: 6px;
      padding: 12px;
      color: #8aa8cc;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.3s, border-color 0.3s;
      letter-spacing: 0.05em;
    }
    #input-form button:hover {
      background: rgba(100,140,200,0.2);
      border-color: rgba(100,140,200,0.4);
    }
    #input-form .hint {
      font-size: 0.7rem; color: #3a4258;
      text-align: center; margin-top: -0.5rem;
    }

    /* ========== LOADING SCREEN ========== */
    #loading-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #050508;
      z-index: 190;
      transition: opacity 0.6s ease;
    }
    #loading-screen.hidden { opacity: 0; pointer-events: none; }
    #loading-screen .loading-text {
      font-size: 0.9rem; color: #5a6a80;
      margin-bottom: 1.5rem;
      letter-spacing: 0.08em;
    }
    #loading-screen .progress-bar-outer {
      width: 280px; height: 3px;
      background: rgba(255,255,255,0.05);
      border-radius: 2px;
      overflow: hidden;
    }
    #loading-screen .progress-bar-inner {
      width: 0%; height: 100%;
      background: linear-gradient(90deg, #4a6a8a, #8ab0dd);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    #loading-screen .progress-detail {
      font-size: 0.7rem; color: #3a4258;
      margin-top: 0.8rem;
    }

    /* ========== ERROR TOAST ========== */
    #error-toast {
      position: fixed;
      top: 20px; left: 50%;
      transform: translateX(-50%) translateY(-80px);
      background: rgba(180,60,60,0.15);
      border: 1px solid rgba(200,80,80,0.3);
      backdrop-filter: blur(10px);
      padding: 14px 24px;
      border-radius: 8px;
      color: #d08888;
      font-size: 0.85rem;
      z-index: 300;
      transition: transform 0.4s ease;
      max-width: 400px;
      text-align: center;
    }
    #error-toast.visible { transform: translateX(-50%) translateY(0); }

    /* ========== SIDE PANEL ========== */
    #side-panel {
      position: fixed;
      top: 0; right: 0;
      width: 380px; height: 100%;
      background: rgba(8, 10, 18, 0.88);
      backdrop-filter: blur(16px);
      border-left: 1px solid rgba(100,140,200,0.1);
      padding: 32px 28px;
      z-index: 150;
      overflow-y: auto;
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }
    #side-panel.open { transform: translateX(0); }
    #side-panel::-webkit-scrollbar { width: 4px; }
    #side-panel::-webkit-scrollbar-track { background: transparent; }
    #side-panel::-webkit-scrollbar-thumb { background: rgba(100,140,200,0.15); border-radius: 2px; }

    #panel-close {
      position: absolute;
      top: 16px; right: 16px;
      background: none; border: none;
      color: #5a6a80; font-size: 1.4rem;
      cursor: pointer;
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px;
      transition: color 0.2s, background 0.2s;
    }
    #panel-close:hover { color: #8aa8cc; background: rgba(255,255,255,0.05); }

    #panel-repo-name {
      font-size: 1.3rem; font-weight: 600;
      color: #8ab0dd;
      margin-bottom: 8px;
      padding-right: 32px;
    }
    #panel-description {
      font-size: 0.8rem; color: #5a6a80;
      line-height: 1.5;
      margin-bottom: 16px;
    }
    #panel-stats {
      display: flex; gap: 16px;
      margin-bottom: 24px;
      font-size: 0.8rem;
    }
    #panel-stats span {
      color: #6a7a8a;
      display: flex; align-items: center; gap: 4px;
    }
    #panel-stats .stat-value { color: #8aa8cc; font-weight: 500; }

    .panel-section-title {
      font-size: 0.7rem;
      font-weight: 600;
      color: #4a5a6a;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
      margin-top: 6px;
    }
    #panel-branches {
      margin-bottom: 24px;
    }
    .branch-item {
      display: flex; justify-content: space-between;
      padding: 6px 10px;
      font-size: 0.78rem;
      color: #6a7a90;
      background: rgba(255,255,255,0.02);
      border-radius: 4px;
      margin-bottom: 3px;
    }
    .branch-item .branch-name { color: #7a9abb; }
    .branch-item .branch-commits { color: #4a5a6a; font-size: 0.7rem; }

    #panel-commits { margin-bottom: 20px; }
    .commit-item {
      padding: 8px 10px;
      border-left: 2px solid rgba(100,140,200,0.15);
      margin-bottom: 6px;
      margin-left: 4px;
    }
    .commit-item .commit-msg {
      font-size: 0.78rem;
      color: #7a8a9a;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .commit-item .commit-date {
      font-size: 0.65rem;
      color: #3a4a5a;
      margin-top: 3px;
    }

    .panel-loading {
      font-size: 0.78rem;
      color: #3a4a5a;
      font-style: italic;
      padding: 8px 0;
    }

    /* ========== REPO LABEL TOOLTIP ========== */
    #repo-tooltip {
      position: fixed;
      padding: 6px 12px;
      background: rgba(8, 10, 18, 0.9);
      border: 1px solid rgba(100,140,200,0.15);
      border-radius: 4px;
      font-size: 0.75rem;
      color: #8aa8cc;
      pointer-events: none;
      z-index: 160;
      opacity: 0;
      transition: opacity 0.2s;
      white-space: nowrap;
    }
    #repo-tooltip.visible { opacity: 1; }
  </style>
</head>
<body>

  <!-- Input Screen -->
  <div id="input-screen">
    <h1>Shadesmar</h1>
    <div class="subtitle">GitHub Repository Visualizer</div>
    <form id="input-form" autocomplete="off">
      <input type="text" id="username-input" placeholder="GitHub username" required>
      <input type="text" id="token-input" placeholder="Personal Access Token (optional)">
      <div class="hint">PAT increases API rate limit from 60 to 5,000 req/hour</div>
      <button type="submit">Enter the Cognitive Realm</button>
    </form>
  </div>

  <!-- Loading Screen -->
  <div id="loading-screen" class="hidden">
    <div class="loading-text" id="loading-text">Crossing into Shadesmar...</div>
    <div class="progress-bar-outer">
      <div class="progress-bar-inner" id="progress-bar"></div>
    </div>
    <div class="progress-detail" id="progress-detail"></div>
  </div>

  <!-- Error Toast -->
  <div id="error-toast"></div>

  <!-- Side Panel -->
  <div id="side-panel">
    <button id="panel-close">&times;</button>
    <h2 id="panel-repo-name"></h2>
    <p id="panel-description"></p>
    <div id="panel-stats">
      <span>&#9733; <span class="stat-value" id="panel-stars">0</span></span>
      <span>&#9906; <span class="stat-value" id="panel-forks">0</span></span>
      <span>&#128196; <span class="stat-value" id="panel-language">—</span></span>
    </div>
    <div class="panel-section-title">Branches</div>
    <div id="panel-branches"><div class="panel-loading">Loading branches...</div></div>
    <div class="panel-section-title">Recent Commits</div>
    <div id="panel-commits"><div class="panel-loading">Loading commits...</div></div>
  </div>

  <!-- Repo Tooltip -->
  <div id="repo-tooltip"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script>
    // ============================================================
    // CONFIGURATION
    // ============================================================
    const CONFIG = {
      island: { baseRadius: 18, height: 1.2, yPos: -0.5 },
      beads: { count: 8000, innerRadius: 20, outerRadius: 55, waveSpeed: 0.4, waveAmp: 0.35 },
      tree: { maxHeight: 14, minHeight: 1.5, trunkRadiusBase: 0.22, trunkRadiusTop: 0.1, branchMinCount: 2, branchMaxCount: 6 },
      flame: { count: 0, baseOpacity: 0.25, highlightOpacity: 0.8, dimOpacity: 0.08, driftSpeed: 0.15 },
      camera: { fov: 55, near: 0.1, far: 200, defaultRadius: 45, defaultPhi: 1.1, defaultTheta: 0, autoOrbitSpeed: 0.08, orbitDamping: 0.92 },
      colors: {
        orbBright: [0.55, 0.78, 1.0],
        orbDim: [0.2, 0.35, 0.6],
        flameDim: 0xcc6622,
        flameHighlight: 0xff9944,
        obsidian: 0x0a0a0e,
        obsidianHighlight: 0x141420,
        fog: 0x030305,
        sun: 0xddeeff,
        ambient: 0x111122,
      }
    };

    // ============================================================
    // STATE
    // ============================================================
    const state = {
      username: '',
      token: '',
      repos: [],
      allContributors: new Map(),   // login -> { login, repos: Set<repoName> }
      repoContributors: new Map(),  // repoName -> Set<login>
      // Three.js objects (to be initialized later)
      scene: null, camera: null, renderer: null, clock: null,
      island: null,
      beadPositions: null, beadSystem: null,
      trees: [],
      treeObjects: [],
      flames: [],
      // Camera
      camTheta: 0, camPhi: 1.1, camRadius: 45,
      camTarget: null,
      autoOrbit: true,
      isDragging: false, dragStartX: 0, dragStartY: 0,
      dragVelX: 0, dragVelY: 0,
      // Tween
      cameraTween: null,
      // Interaction
      raycaster: null, mouse: null,
      hoveredTree: null,
      selectedTree: null,
      panelOpen: false,
      // Cache for lazy-loaded data
      repoDetailCache: {},
    };

    // ============================================================
    // GITHUB API
    // ============================================================
    async function apiFetch(url, token) {
      const headers = { Accept: 'application/vnd.github.v3+json' };
      if (token) headers.Authorization = `token ${token}`;
      const res = await fetch(url, { headers });
      if (res.status === 404) throw new Error('NOT_FOUND');
      if (res.status === 403) {
        const data = await res.json().catch(() => ({}));
        if (data.message && data.message.includes('rate limit')) throw new Error('RATE_LIMIT');
        throw new Error('FORBIDDEN');
      }
      if (!res.ok) throw new Error(`HTTP_${res.status}`);
      return res;
    }

    async function fetchRepos(username, token) {
      const res = await apiFetch(
        `https://api.github.com/users/${username}/repos?per_page=100&sort=updated`,
        token
      );
      return res.json();
    }

    async function fetchContributors(owner, repo, token) {
      try {
        const res = await apiFetch(
          `https://api.github.com/repos/${owner}/${repo}/contributors?per_page=30`,
          token
        );
        return res.json();
      } catch (e) {
        return [];
      }
    }

    async function fetchCommitCount(owner, repo, branch, token) {
      try {
        const res = await apiFetch(
          `https://api.github.com/repos/${owner}/${repo}/commits?sha=${branch}&per_page=1`,
          token
        );
        const linkHeader = res.headers.get('Link');
        if (!linkHeader) return 1;
        const match = linkHeader.match(/page=(\d+)>;\s*rel="last"/);
        return match ? parseInt(match[1], 10) : 1;
      } catch (e) {
        return 0;
      }
    }

    async function fetchBranches(owner, repo, token) {
      try {
        const res = await apiFetch(
          `https://api.github.com/repos/${owner}/${repo}/branches?per_page=30`,
          token
        );
        return res.json();
      } catch (e) {
        return [];
      }
    }

    async function fetchRecentCommits(owner, repo, branch, token) {
      try {
        const res = await apiFetch(
          `https://api.github.com/repos/${owner}/${repo}/commits?sha=${branch}&per_page=5`,
          token
        );
        return res.json();
      } catch (e) {
        return [];
      }
    }

    async function fetchAllData(username, token) {
      // Step 1: Fetch repos
      updateLoadingText('Fetching repositories...');
      let repos;
      try {
        repos = await fetchRepos(username, token);
      } catch (e) {
        if (e.message === 'NOT_FOUND') throw new Error('User not found. Please check the username.');
        if (e.message === 'RATE_LIMIT') throw new Error('API rate limit exceeded. Please provide a GitHub Personal Access Token.');
        throw new Error('Failed to fetch repositories. Please try again.');
      }

      if (!repos || repos.length === 0) {
        throw new Error('No public repositories found for this user.');
      }

      // Filter to non-fork public repos
      repos = repos.filter(r => !r.fork);
      updateLoadingText(`Found ${repos.length} repositories. Fetching details...`);

      const totalCalls = repos.length * 2;
      let completedCalls = 0;

      const updateProgress = () => {
        completedCalls++;
        const pct = Math.round((completedCalls / totalCalls) * 100);
        setProgressBar(pct);
        updateProgressDetail(`${completedCalls} / ${totalCalls} API calls completed`);
      };

      // Step 2: Fetch contributors and commit counts in parallel per repo
      const enrichedRepos = await Promise.all(repos.map(async (repo) => {
        const [contributors, commitCount] = await Promise.all([
          fetchContributors(username, repo.name, token).then(r => { updateProgress(); return r; }),
          fetchCommitCount(username, repo.name, repo.default_branch || 'main', token).then(r => { updateProgress(); return r; }),
        ]);

        // Store contributor data
        const logins = new Set();
        (contributors || []).forEach(c => {
          if (!c || !c.login) return;
          logins.add(c.login);
          if (!state.allContributors.has(c.login)) {
            state.allContributors.set(c.login, { login: c.login, repos: new Set() });
          }
          state.allContributors.get(c.login).repos.add(repo.name);
        });
        state.repoContributors.set(repo.name, logins);

        return {
          name: repo.name,
          fullName: repo.full_name,
          description: repo.description || '',
          stars: repo.stargazers_count || 0,
          forks: repo.forks_count || 0,
          language: repo.language || '—',
          defaultBranch: repo.default_branch || 'main',
          commitCount: commitCount || 0,
          url: repo.html_url,
        };
      }));

      return enrichedRepos;
    }

    // ============================================================
    // UI CONTROLLERS
    // ============================================================
    function updateLoadingText(text) {
      document.getElementById('loading-text').textContent = text;
    }
    function setProgressBar(pct) {
      document.getElementById('progress-bar').style.width = pct + '%';
    }
    function updateProgressDetail(text) {
      document.getElementById('progress-detail').textContent = text;
    }
    function showScreen(id) {
      document.getElementById(id).classList.remove('hidden');
    }
    function hideScreen(id) {
      document.getElementById(id).classList.add('hidden');
    }
    function showError(msg) {
      const el = document.getElementById('error-toast');
      el.textContent = msg;
      el.classList.add('visible');
      setTimeout(() => el.classList.remove('visible'), 5000);
    }
    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    // ============================================================
    // THREE.JS SCENE SETUP
    // ============================================================
    function initScene() {
      state.renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
      state.renderer.setSize(window.innerWidth, window.innerHeight);
      state.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      state.renderer.setClearColor(CONFIG.colors.fog, 1);
      document.body.appendChild(state.renderer.domElement);

      state.scene = new THREE.Scene();
      state.scene.fog = new THREE.FogExp2(CONFIG.colors.fog, 0.018);
      state.scene.background = new THREE.Color(CONFIG.colors.fog);

      state.camera = new THREE.PerspectiveCamera(
        CONFIG.camera.fov,
        window.innerWidth / window.innerHeight,
        CONFIG.camera.near,
        CONFIG.camera.far
      );
      state.camTarget = new THREE.Vector3(0, 2, 0);

      // Dim sun near horizon
      const sunLight = new THREE.DirectionalLight(CONFIG.colors.sun, 0.15);
      sunLight.position.set(30, 4, -50);
      state.scene.add(sunLight);

      // Small sun sphere
      const sunGeo = new THREE.SphereGeometry(0.8, 16, 16);
      const sunMat = new THREE.MeshBasicMaterial({ color: 0xddeeff });
      const sunMesh = new THREE.Mesh(sunGeo, sunMat);
      sunMesh.position.set(60, 6, -100);
      state.scene.add(sunMesh);

      // Very low ambient
      const ambientLight = new THREE.AmbientLight(CONFIG.colors.ambient, 0.3);
      state.scene.add(ambientLight);

      // Subtle hemisphere light for fill
      const hemiLight = new THREE.HemisphereLight(0x111122, 0x050508, 0.15);
      state.scene.add(hemiLight);

      state.clock = new THREE.Clock();
      state.raycaster = new THREE.Raycaster();
      state.mouse = new THREE.Vector2(-999, -999);

      window.addEventListener('resize', () => {
        state.camera.aspect = window.innerWidth / window.innerHeight;
        state.camera.updateProjectionMatrix();
        state.renderer.setSize(window.innerWidth, window.innerHeight);
      });
    }

    // ============================================================
    // ISLAND
    // ============================================================
    function createIsland(repoCount) {
      const radius = Math.max(CONFIG.island.baseRadius, repoCount * 0.4 + 10);
      CONFIG.island.currentRadius = radius;

      const islandGeo = new THREE.CylinderGeometry(radius, radius * 1.1, CONFIG.island.height, 48, 1);
      const islandMat = new THREE.MeshStandardMaterial({
        color: CONFIG.colors.obsidian,
        roughness: 0.5,
        metalness: 0.6,
      });
      const island = new THREE.Mesh(islandGeo, islandMat);
      island.position.y = CONFIG.island.yPos;
      state.scene.add(island);

      // Top surface
      const surfaceGeo = new THREE.CylinderGeometry(radius * 0.98, radius * 0.98, 0.08, 48, 1);
      const surfaceMat = new THREE.MeshStandardMaterial({
        color: 0x0e0e14,
        roughness: 0.7,
        metalness: 0.4,
      });
      const surface = new THREE.Mesh(surfaceGeo, surfaceMat);
      surface.position.y = CONFIG.island.yPos + CONFIG.island.height / 2;
      state.scene.add(surface);

      // Edge glow ring
      const ringGeo = new THREE.TorusGeometry(radius, 0.08, 8, 64);
      const ringMat = new THREE.MeshBasicMaterial({
        color: 0x1a2a3a,
        transparent: true,
        opacity: 0.3,
      });
      const ring = new THREE.Mesh(ringGeo, ringMat);
      ring.rotation.x = Math.PI / 2;
      ring.position.y = CONFIG.island.yPos + CONFIG.island.height / 2 + 0.05;
      state.scene.add(ring);

      state.island = island;
      return radius;
    }

    // ============================================================
    // BEAD SEA
    // ============================================================
    function createBeadSea(islandRadius) {
      const count = CONFIG.beads.count;
      const innerR = islandRadius + 1.5;
      const outerR = CONFIG.beads.outerRadius;
      const positions = new Float32Array(count * 3);
      const basePositions = new Float32Array(count * 3);

      for (let i = 0; i < count; i++) {
        const angle = Math.random() * Math.PI * 2;
        const dist = innerR + Math.pow(Math.random(), 0.7) * (outerR - innerR);
        const x = dist * Math.cos(angle);
        const z = dist * Math.sin(angle);
        const y = -0.8 + Math.random() * 0.2;
        positions[i * 3] = x;
        positions[i * 3 + 1] = y;
        positions[i * 3 + 2] = z;
        basePositions[i * 3] = x;
        basePositions[i * 3 + 1] = y;
        basePositions[i * 3 + 2] = z;
      }

      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

      const material = new THREE.ShaderMaterial({
        uniforms: {
          pointSize: { value: 3.5 },
          baseColor: { value: new THREE.Color(0x08080e) },
          highlightColor: { value: new THREE.Color(0x141420) },
        },
        vertexShader: `
          uniform float pointSize;
          varying float vDist;
          void main() {
            vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
            vDist = length(position.xz) * 0.01;
            gl_PointSize = pointSize * (250.0 / -mvPosition.z);
            gl_Position = projectionMatrix * mvPosition;
          }
        `,
        fragmentShader: `
          uniform vec3 baseColor;
          uniform vec3 highlightColor;
          varying float vDist;
          void main() {
            float dist = length(gl_PointCoord - vec2(0.5));
            if (dist > 0.5) discard;
            float highlight = 1.0 - smoothstep(0.0, 0.3, dist);
            vec3 color = mix(baseColor, highlightColor, highlight * 0.5);
            float edge = smoothstep(0.45, 0.5, dist);
            gl_FragColor = vec4(color, 1.0 - edge * 0.5);
          }
        `,
        transparent: true,
        depthWrite: false,
      });

      state.beadSystem = new THREE.Points(geometry, material);
      state.beadPositions = basePositions;
      state.scene.add(state.beadSystem);
    }

    function animateBeads(time) {
      if (!state.beadSystem) return;
      const posAttr = state.beadSystem.geometry.attributes.position;
      const base = state.beadPositions;
      const speed = CONFIG.beads.waveSpeed;
      const amp = CONFIG.beads.waveAmp;

      for (let i = 0; i < CONFIG.beads.count; i++) {
        const bx = base[i * 3];
        const bz = base[i * 3 + 2];
        const by = base[i * 3 + 1];
        posAttr.array[i * 3 + 1] = by + Math.sin(time * speed + bx * 0.06 + bz * 0.06) * amp
          + Math.sin(time * speed * 0.7 + bx * 0.1 - bz * 0.04) * amp * 0.3;
      }
      posAttr.needsUpdate = true;
    }

    // ============================================================
    // TREE GENERATION
    // ============================================================
    const obsidianMat = new THREE.MeshStandardMaterial({
      color: CONFIG.colors.obsidian,
      roughness: 0.4,
      metalness: 0.7,
    });
    const obsidianHighlightMat = new THREE.MeshStandardMaterial({
      color: CONFIG.colors.obsidianHighlight,
      roughness: 0.3,
      metalness: 0.8,
      emissive: 0x0d1520,
      emissiveIntensity: 0.6,
    });

    function createTree(repoData) {
      const group = new THREE.Group();
      group.userData = { repo: repoData, isTree: true };

      const commitCount = Math.max(repoData.commitCount, 1);
      const trunkHeight = Math.min(
        CONFIG.tree.minHeight + Math.log2(commitCount + 1) * 1.3,
        CONFIG.tree.maxHeight
      );
      group.userData.trunkHeight = trunkHeight;

      // Trunk
      const trunkGeo = new THREE.CylinderGeometry(
        CONFIG.tree.trunkRadiusTop, CONFIG.tree.trunkRadiusBase, trunkHeight, 8
      );
      trunkGeo.translate(0, trunkHeight / 2, 0);
      const trunk = new THREE.Mesh(trunkGeo, obsidianMat.clone());
      trunk.userData = { isTreePart: true, treeGroup: group };
      group.add(trunk);

      // Crystal tip
      const tipGeo = new THREE.ConeGeometry(CONFIG.tree.trunkRadiusTop * 1.5, trunkHeight * 0.15, 6);
      tipGeo.translate(0, trunkHeight + trunkHeight * 0.075, 0);
      const tipMesh = new THREE.Mesh(tipGeo, obsidianMat.clone());
      tipMesh.userData = { isTreePart: true, treeGroup: group };
      group.add(tipMesh);

      // Commit orbs along trunk
      const orbCount = Math.min(Math.ceil(commitCount / 10), 10);
      for (let i = 0; i < orbCount; i++) {
        const t = (i + 0.5) / orbCount;
        const brightness = (i + 1) / orbCount;
        const r = CONFIG.colors.orbDim[0] + (CONFIG.colors.orbBright[0] - CONFIG.colors.orbDim[0]) * brightness;
        const g = CONFIG.colors.orbDim[1] + (CONFIG.colors.orbBright[1] - CONFIG.colors.orbDim[1]) * brightness;
        const b = CONFIG.colors.orbDim[2] + (CONFIG.colors.orbBright[2] - CONFIG.colors.orbDim[2]) * brightness;

        const orbRadius = 0.06 + brightness * 0.06;
        const orbGeo = new THREE.SphereGeometry(orbRadius, 8, 8);
        const orbMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(r, g, b) });
        const orb = new THREE.Mesh(orbGeo, orbMat);
        orb.position.y = t * trunkHeight;
        group.add(orb);

        // Glow sphere
        const glowGeo = new THREE.SphereGeometry(orbRadius * 3, 8, 8);
        const glowMat = new THREE.MeshBasicMaterial({
          color: new THREE.Color(r, g, b),
          transparent: true,
          opacity: 0.08 + brightness * 0.07,
        });
        const glow = new THREE.Mesh(glowGeo, glowMat);
        glow.position.y = t * trunkHeight;
        group.add(glow);
      }

      // Procedural branches
      const branchCount = CONFIG.tree.branchMinCount +
        Math.floor(Math.random() * (CONFIG.tree.branchMaxCount - CONFIG.tree.branchMinCount + 1));
      for (let i = 0; i < branchCount; i++) {
        const branchGroup = new THREE.Group();
        const heightFraction = 0.25 + (i / branchCount) * 0.55 + Math.random() * 0.1;
        const startY = heightFraction * trunkHeight;
        const branchLength = trunkHeight * (0.2 + Math.random() * 0.25);
        const azimuth = (i / branchCount) * Math.PI * 2 + (Math.random() - 0.5) * 0.4;
        const tiltAngle = Math.PI / 4 + (Math.random() - 0.5) * 0.4;

        branchGroup.position.y = startY;
        branchGroup.rotation.y = azimuth;
        branchGroup.rotation.z = tiltAngle;

        const branchGeo = new THREE.CylinderGeometry(0.03, 0.07, branchLength, 6);
        branchGeo.translate(0, branchLength / 2, 0);
        const branchMesh = new THREE.Mesh(branchGeo, obsidianMat.clone());
        branchMesh.userData = { isTreePart: true, treeGroup: group };
        branchGroup.add(branchMesh);

        // Tip crystal
        const btipGeo = new THREE.OctahedronGeometry(0.08 + Math.random() * 0.06, 0);
        btipGeo.translate(0, branchLength + 0.08, 0);
        const btipMesh = new THREE.Mesh(btipGeo, obsidianMat.clone());
        btipMesh.userData = { isTreePart: true, treeGroup: group };
        branchGroup.add(btipMesh);

        // Branch tip orb
        const tipBrightness = 0.3 + Math.random() * 0.4;
        const tr = CONFIG.colors.orbDim[0] + (CONFIG.colors.orbBright[0] - CONFIG.colors.orbDim[0]) * tipBrightness;
        const tg = CONFIG.colors.orbDim[1] + (CONFIG.colors.orbBright[1] - CONFIG.colors.orbDim[1]) * tipBrightness;
        const tb = CONFIG.colors.orbDim[2] + (CONFIG.colors.orbBright[2] - CONFIG.colors.orbDim[2]) * tipBrightness;
        const tipOrbGeo = new THREE.SphereGeometry(0.05, 8, 8);
        const tipOrbMat = new THREE.MeshBasicMaterial({ color: new THREE.Color(tr, tg, tb) });
        const tipOrb = new THREE.Mesh(tipOrbGeo, tipOrbMat);
        tipOrb.position.y = branchLength * 0.85;
        branchGroup.add(tipOrb);

        // Tip orb glow
        const tipGlowGeo = new THREE.SphereGeometry(0.15, 8, 8);
        const tipGlowMat = new THREE.MeshBasicMaterial({
          color: new THREE.Color(tr, tg, tb),
          transparent: true,
          opacity: 0.06 + tipBrightness * 0.05,
        });
        const tipGlow = new THREE.Mesh(tipGlowGeo, tipGlowMat);
        tipGlow.position.y = branchLength * 0.85;
        branchGroup.add(tipGlow);

        group.add(branchGroup);
      }

      // Point light near top for local illumination
      const treeLight = new THREE.PointLight(0x4488cc, 0.3, trunkHeight * 2);
      treeLight.position.y = trunkHeight * 0.7;
      group.add(treeLight);

      return group;
    }

    function createAllTrees(repos) {
      const sorted = [...repos].sort((a, b) => b.commitCount - a.commitCount);
      const islandRadius = CONFIG.island.currentRadius;
      const n = sorted.length;

      sorted.forEach((repo, i) => {
        const tree = createTree(repo);
        const t = n > 1 ? i / (n - 1) : 0.5;
        const ringRadius = 2 + t * (islandRadius * 0.8 - 2);
        const angle = i * 2.399 + (Math.random() - 0.5) * 0.3; // golden angle
        const x = ringRadius * Math.cos(angle) + (Math.random() - 0.5) * 1.5;
        const z = ringRadius * Math.sin(angle) + (Math.random() - 0.5) * 1.5;

        tree.position.set(x, CONFIG.island.yPos + CONFIG.island.height / 2 + 0.04, z);
        state.scene.add(tree);
        state.trees.push({ group: tree, repo });

        tree.traverse(child => {
          if (child.isMesh && child.userData.isTreePart) {
            state.treeObjects.push(child);
          }
        });
      });
    }

    function highlightTree(treeGroup) {
      treeGroup.traverse(child => {
        if (child.isMesh && child.userData.isTreePart) {
          child.material = obsidianHighlightMat;
        }
      });
    }

    function unhighlightTree(treeGroup) {
      treeGroup.traverse(child => {
        if (child.isMesh && child.userData.isTreePart) {
          child.material = obsidianMat.clone();
        }
      });
    }

    // ============================================================
    // CONTRIBUTOR FLAMES
    // ============================================================
    function createFlameTexture() {
      const canvas = document.createElement('canvas');
      canvas.width = 64;
      canvas.height = 64;
      const ctx = canvas.getContext('2d');

      const gradient = ctx.createRadialGradient(32, 40, 2, 32, 32, 28);
      gradient.addColorStop(0, 'rgba(255, 200, 100, 1)');
      gradient.addColorStop(0.3, 'rgba(255, 140, 50, 0.8)');
      gradient.addColorStop(0.6, 'rgba(200, 80, 20, 0.4)');
      gradient.addColorStop(1, 'rgba(100, 30, 10, 0)');
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.ellipse(32, 36, 16, 24, 0, 0, Math.PI * 2);
      ctx.fill();

      const core = ctx.createRadialGradient(32, 42, 1, 32, 38, 10);
      core.addColorStop(0, 'rgba(255, 255, 200, 1)');
      core.addColorStop(0.5, 'rgba(255, 180, 80, 0.5)');
      core.addColorStop(1, 'rgba(255, 100, 30, 0)');
      ctx.fillStyle = core;
      ctx.beginPath();
      ctx.ellipse(32, 40, 8, 14, 0, 0, Math.PI * 2);
      ctx.fill();

      return new THREE.CanvasTexture(canvas);
    }

    function createAllFlames(islandRadius) {
      const flameTexture = createFlameTexture();

      state.allContributors.forEach((contributor, login) => {
        const spriteMat = new THREE.SpriteMaterial({
          map: flameTexture,
          color: CONFIG.colors.flameDim,
          transparent: true,
          opacity: CONFIG.flame.baseOpacity,
          blending: THREE.AdditiveBlending,
          depthWrite: false,
        });
        const sprite = new THREE.Sprite(spriteMat);

        const angle = Math.random() * Math.PI * 2;
        const dist = islandRadius + 3 + Math.random() * 20;
        sprite.position.set(
          dist * Math.cos(angle),
          -0.2 + Math.random() * 0.5,
          dist * Math.sin(angle)
        );
        sprite.scale.set(0.6, 1.0, 1);

        sprite.userData = {
          login,
          repos: contributor.repos,
          baseOpacity: CONFIG.flame.baseOpacity,
          highlighted: false,
          phase: Math.random() * Math.PI * 2,
          flickerSpeed: 2.5 + Math.random() * 2,
          driftVx: (Math.random() - 0.5) * CONFIG.flame.driftSpeed,
          driftVz: (Math.random() - 0.5) * CONFIG.flame.driftSpeed,
          baseY: sprite.position.y,
        };

        state.scene.add(sprite);
        state.flames.push(sprite);
      });
    }

    function animateFlames(time) {
      state.flames.forEach(flame => {
        const ud = flame.userData;
        const flicker = Math.sin(time * ud.flickerSpeed + ud.phase) * 0.3 + 0.7;
        const flicker2 = Math.sin(time * ud.flickerSpeed * 1.3 + ud.phase * 2.1) * 0.15 + 0.85;

        if (ud.highlighted) {
          flame.material.opacity = CONFIG.flame.highlightOpacity * flicker * flicker2;
          flame.material.color.setHex(CONFIG.colors.flameHighlight);
          flame.scale.set(0.8, 1.3 * flicker2, 1);
        } else if (state.hoveredTree) {
          flame.material.opacity = CONFIG.flame.dimOpacity * flicker;
          flame.material.color.setHex(CONFIG.colors.flameDim);
          flame.scale.set(0.4, 0.7 * flicker2, 1);
        } else {
          flame.material.opacity = ud.baseOpacity * flicker * flicker2;
          flame.material.color.setHex(CONFIG.colors.flameDim);
          flame.scale.set(0.5, 0.9 * flicker2, 1);
        }

        // Drift
        flame.position.x += ud.driftVx * 0.016;
        flame.position.z += ud.driftVz * 0.016;
        flame.position.y = ud.baseY + Math.sin(time * 0.5 + ud.phase) * 0.15;

        // Bounce off boundaries
        const dist = Math.sqrt(flame.position.x ** 2 + flame.position.z ** 2);
        if (dist > CONFIG.beads.outerRadius - 2 || dist < (CONFIG.island.currentRadius || 20) + 2) {
          ud.driftVx *= -1;
          ud.driftVz *= -1;
        }
      });
    }

    function highlightFlamesForRepo(repoName) {
      const contributors = state.repoContributors.get(repoName);
      if (!contributors) return;
      state.flames.forEach(flame => {
        flame.userData.highlighted = contributors.has(flame.userData.login);
      });
    }

    function resetFlames() {
      state.flames.forEach(flame => {
        flame.userData.highlighted = false;
      });
    }

    // ============================================================
    // CAMERA (basic spherical positioning)
    // ============================================================
    function updateCameraFromSpherical() {
      const { camTheta, camPhi, camRadius, camTarget } = state;
      state.camera.position.x = camTarget.x + camRadius * Math.sin(camPhi) * Math.cos(camTheta);
      state.camera.position.y = camTarget.y + camRadius * Math.cos(camPhi);
      state.camera.position.z = camTarget.z + camRadius * Math.sin(camPhi) * Math.sin(camTheta);
      state.camera.lookAt(camTarget);
    }

    // ============================================================
    // ANIMATION LOOP
    // ============================================================
    function animate() {
      requestAnimationFrame(animate);
      const delta = state.clock.getDelta();
      const time = state.clock.getElapsedTime();

      // Auto orbit
      if (state.autoOrbit) {
        state.camTheta += CONFIG.camera.autoOrbitSpeed * delta;
      }

      updateCameraFromSpherical();
      animateBeads(time);
      animateFlames(time);
      state.renderer.render(state.scene, state.camera);
    }

    // ============================================================
    // SCENE BUILDER
    // ============================================================
    function buildScene(repos) {
      const islandRadius = createIsland(repos.length);
      createBeadSea(islandRadius);
      createAllTrees(repos);
      createAllFlames(islandRadius);
    }

    // ============================================================
    // ENTRY POINT
    // ============================================================
    async function start(username, token) {
      state.username = username;
      state.token = token;

      hideScreen('input-screen');
      showScreen('loading-screen');
      setProgressBar(0);

      try {
        const repos = await fetchAllData(username, token);
        state.repos = repos;

        updateLoadingText('Building Shadesmar...');
        setProgressBar(100);

        await new Promise(r => setTimeout(r, 400));

        buildScene(repos);
        hideScreen('loading-screen');
        animate();
      } catch (err) {
        hideScreen('loading-screen');
        showScreen('input-screen');
        showError(err.message || 'An unexpected error occurred.');
      }
    }

    // DOM ready
    document.addEventListener('DOMContentLoaded', () => {
      initScene();

      document.getElementById('input-form').addEventListener('submit', (e) => {
        e.preventDefault();
        const username = document.getElementById('username-input').value.trim();
        const token = document.getElementById('token-input').value.trim();
        if (!username) return;
        start(username, token);
      });

      document.getElementById('panel-close').addEventListener('click', (e) => {
        e.stopPropagation();
        document.getElementById('side-panel').classList.remove('open');
      });
    });
  </script>
</body>
